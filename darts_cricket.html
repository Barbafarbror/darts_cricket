<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dart Cricket</title>
<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
<style>
    body { 
        font-family: Arial, sans-serif; 
        padding: 20px 20px 0 20px; 
        background-color: #f2f2f2; 
        color: #000; 
        display: flex;
        justify-content: center;
        transition: all 0.3s;
    }

    .container {
        text-align: center;
        margin-top: -20px;
    }

    h2 {
        font-family: 'Metal Mania', cursive;
        font-size: 144px; /* 3x större */
        color: #8B004B; /* Vinröd/lila huvudfärg */
        margin-bottom: 10px;
        -webkit-text-stroke: 1px black; /* ram runt text */
        text-shadow: 0 0 2px #C71585,
                     0 0 4px #FF1493,
                     0 0 6px #FF69B4,
                     0 0 8px #C71585,
                     0 0 10px #FF1493;
    }

    #controls {
        display: inline-block;
        text-align: left;
        margin-right: 20px;
        vertical-align: top;
    }

    table { 
        border-collapse: collapse; 
        margin-top: 20px; 
        background-color: #ffffff; 
    }

    th, td { 
        border: 1px solid black; 
        padding: 10px; 
        text-align: center; 
        min-width: 40px; 
        cursor: pointer; 
        transition: all 0.3s; 
        background-color: #ffffff; 
        color: black;
    }

    th { background-color: #ffffff; color: black; }
    .label { cursor: default; font-weight: bold; color: black; background-color: #ffffff; }
    th[contenteditable="true"] { background-color: #ffffff; }

    .multi-btn { 
        display: inline-block; 
        margin: 5px; 
        padding: 10px 15px; 
        border-radius: 50%; 
        background-color: #ff6666; 
        color: black; 
        font-weight: bold; 
        cursor: pointer;
        user-select: none; 
        transition: all 0.2s;
        border: 2px solid black;
        transform: scale(0.8); /* 80% storlek */
    }

    .multi-btn:hover { transform: scale(0.88); }

    @media (max-width: 500px) {
        table { font-size: 12px; }
        td, th { padding: 5px; }
    }
</style>
</head>
<body>
<div class="container">
    <h2 id="main-title">Dart Cricket</h2>

    <div id="controls">
        <label for="playerCount">Antal spelare (1-4): </label>
        <select id="playerCount">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
        <br><br>
        <button onclick="createGame()">Starta spel</button>
        <button onclick="undo()">Ångra senaste klick</button>
        <br><br>
        <button onclick="setMode('light')">Light Mode</button>
        <button onclick="setMode('dark')">Dark Mode</button>
    </div>

    <div id="game" style="display:inline-block;"></div>
    <div id="multi-buttons" style="margin-top:10px;"></div>
</div>

<script>
let players = [];
let targets = ["20","19","18","17","16","15","B"];
let gameOver = false;
let history = [];
let multiplier = 1;

function createGame(){
    const numPlayers = parseInt(document.getElementById("playerCount").value);
    const defaultColors = ["#add8e6","#90ee90","#ffff66","#ffb6c1"];
    players = [];
    for(let i=0;i<numPlayers;i++){
        players.push({name:`Spelare ${i+1}`, hits:Array(targets.length).fill(0), score:0, color:defaultColors[i]});
    }
    gameOver=false; history=[]; multiplier=1;
    renderGame();
    renderMultiButtons();
}

function renderGame(){
    const gameDiv = document.getElementById("game");
    let html = "<table><tr><th>Nr</th>";
    players.forEach((p,i)=>{ html+=`<th contenteditable="true" oninput="updatePlayerName(${i},this.innerText)">${p.name}</th>`});
    html+="</tr>";
    targets.forEach((t,row)=>{
        html+=`<tr><td class="label">${t}</td>`;
        players.forEach((p,col)=>{
            html+=`<td id="cell-${row}-${col}" onclick="handleClick(${row},${col})" style="background-color:${p.color}; color:black;"></td>`;
        });
        html+="</tr>";
    });
    html+=`<tr><td class="label">Poäng</td>`;
    players.forEach((p,i)=>{ html+=`<td id="score-${i}">0</td>`});
    html+="</tr>";
    gameDiv.innerHTML=html;
}

function renderMultiButtons(){
    const div=document.getElementById("multi-buttons");
    div.innerHTML='';
    ['1','2','3'].forEach(x=>{
        const btn=document.createElement('div');
        btn.className='multi-btn';
        btn.innerText='X'+x;
        btn.onclick=()=>{ multiplier=parseInt(x); highlightMultiButton(btn); };
        div.appendChild(btn);
    });
}

function highlightMultiButton(btn){
    document.querySelectorAll('.multi-btn').forEach(b=>b.style.border='2px solid black');
    btn.style.border='2px solid black';
}

function updatePlayerName(idx,name){ players[idx].name=name; }

function handleClick(row,playerIndex){
    if(gameOver) return;

    history.push({row,playerIndex,prevHit:players[playerIndex].hits[row], prevScore:players[playerIndex].score});

    let prevHits = players[playerIndex].hits[row];
    players[playerIndex].hits[row] += multiplier;
    if(players[playerIndex].hits[row] > 4) players[playerIndex].hits[row] = 4;

    let newHits = players[playerIndex].hits[row];

    if(newHits >= 3){
        let openForOpponents = false;
        for(let i=0;i<players.length;i++){
            if(i!==playerIndex && players[i].hits[row]<3){
                openForOpponents = true;
                break;
            }
        }
        if(openForOpponents){
            let points = targets[row] === "B" ? 25 : parseInt(targets[row]);
            // Endast poäng för träffar över stängning (3 träffar)
            let extraHits = Math.max(0, newHits - 3);
            let prevExtraHits = Math.max(0, prevHits - 3);
            let scoreToAdd = points * (extraHits - prevExtraHits + 1); // +1 för sista stängningskastet
            players[playerIndex].score += scoreToAdd;
        }
    }

    updateCell(row,playerIndex);
    updateScore(playerIndex);
    checkWinner();
}

function updateCell(row,playerIndex){
    const cell=document.getElementById(`cell-${row}-${playerIndex}`);
    const val=players[playerIndex].hits[row];

    cell.style.transition="transform 0.3s";

    if(val===0) cell.innerHTML="";
    else if(val===1) cell.innerHTML="/";
    else if(val===2) cell.innerHTML="X";
    else{
        cell.innerHTML=`
        <svg width="24" height="24">
          <circle cx="12" cy="12" r="11" stroke="black" stroke-width="2" fill="none"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke="black" stroke-width="2"/>
          <line x1="6" y1="18" x2="18" y2="6" stroke="black" stroke-width="2"/>
        </svg>`;
        cell.style.transform="scale(1.3)";
        setTimeout(()=>{cell.style.transform="scale(1)";},300);
    }

    if(val===1 || val===2) cell.style.color='black';
}

function updateScore(idx){ document.getElementById(`score-${idx}`).innerText = players[idx].score; }

function checkWinner(){
    let closed=[];
    for(let i=0;i<players.length;i++){ if(players[i].hits.every(h=>h>=3)) closed.push(i); }
    if(closed.length===0) return;
    let maxScore=Math.max(...players.map(p=>p.score));
    for(let i of closed){ if(players[i].score===maxScore || maxScore===0){ alert(`${players[i].name} vinner!`); gameOver=true; return; } }
}

function undo(){
    if(history.length===0) return;
    const last=history.pop();
    const {row,playerIndex,prevHit,prevScore}=last;
    players[playerIndex].hits[row]=prevHit;
    players[playerIndex].score=prevScore;
    updateCell(row,playerIndex);
    updateScore(playerIndex);
    gameOver=false;
}

function setMode(mode){
    const title=document.getElementById('main-title');
    if(mode==='light'){
        document.body.style.backgroundColor="#f2f2f2";
        document.body.style.color="#000";
        title.style.webkitTextStrokeColor='black';
        title.style.textShadow=`
            0 0 2px #C71585,
            0 0 4px #FF1493,
            0 0 6px #FF69B4,
            0 0 8px #C71585,
            0 0 10px #FF1493
        `;
    } else {
        document.body.style.backgroundColor="#333";
        document.body.style.color="#fff";
        title.style.webkitTextStrokeColor='white';
        title.style.textShadow=`
            0 0 2px #00f,
            0 0 4px #0ff,
            0 0 6px #0ff,
            0 0 8px #00f,
            0 0 10px #fff
        `;
    }
}
</script>
</body>
</html>
